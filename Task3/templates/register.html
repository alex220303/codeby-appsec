{% extends "base.html" %} {% block title %}Регистрация{% endblock %} {% block
content %}
<h1>Регистрация</h1>

<form method="post" autocomplete="on">
  <label for="username">Логин</label>
  <input
    type="text"
    id="username"
    name="username"
    required
    minlength="3"
    maxlength="30"
    autocomplete="username"
  />

  <label for="email">Email</label>
  <input
    type="email"
    id="email"
    name="email"
    required
    maxlength="50"
    autocomplete="email"
  />

  <label for="password">Пароль</label>
  <input
    type="password"
    id="password"
    name="password"
    required
    minlength="6"
    maxlength="50"
    autocomplete="new-password"
  />

  <button type="submit">Зарегистрироваться</button>
</form>

<div class="footer-link">
  <a href="{{ url_for('chat') }}">Перейти к переписке</a>
</div>
{% endblock %}
